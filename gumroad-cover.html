<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gumroad Cover (1280x720)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 2rem;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        .gumroad-cover {
            width: 1280px;
            height: 720px;
            background: linear-gradient(135deg, #f0f2ee 0%, #e1e5dd 100%);
            position: relative;
            overflow: hidden;
            border-radius: 8px; /* Remove if you want sharp corners for screenshot */
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
        }

        .content {
            flex: 1;
            padding: 80px;
            z-index: 2;
        }

        .badge {
            background-color: #8fa189;
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-block;
            margin-bottom: 24px;
            font-size: 14px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 80px;
            color: #2c3e2d;
            line-height: 1.1;
            margin: 0 0 24px 0;
            font-weight: 700;
        }

        p {
            font-size: 28px;
            color: #667c68;
            margin: 0 0 40px 0;
            max-width: 600px;
            line-height: 1.5;
        }

        .features {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .feature {
            font-size: 22px;
            font-weight: 600;
            color: #2c3e2d;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feature-icon {
            display: inline-block;
            width: 32px;
            height: 32px;
            background: #8fa189;
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 32px;
            font-size: 16px;
        }

        .image-container {
            flex: 0.8;
            height: 100%;
            position: relative;
        }

        .image-container img {
            position: absolute;
            right: -50px;
            top: 50%;
            transform: translateY(-50%) rotate(-5deg);
            height: 90%;
            border-radius: 20px;
            box-shadow: -20px 30px 60px rgba(0,0,0,0.15);
        }

        /* Ambient background decoration */
        .circle-1 {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(143,161,137,0.1) 0%, rgba(255,255,255,0) 70%);
            top: -200px;
            left: -100px;
            border-radius: 50%;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="gumroad-cover">
        <div class="circle-1"></div>
        <div class="content">
            <div class="badge">Interactive Dashboard</div>
            <h1>100 AI Prompts<br>for Spa & Wellness</h1>
            <p>Scale your luxury business, automate your marketing, and book more clients with precision AI.</p>
            <div class="features">
                <div class="feature"><span class="feature-icon">✓</span> Copy & Paste Formulas</div>
                <div class="feature"><span class="feature-icon">✓</span> 6 Expert Categories</div>
                <div class="feature"><span class="feature-icon">✓</span> Zero Tech Skills Needed</div>
            </div>
        </div>
        <div class="image-container">
            <!-- Ensure this image matches the generated landing hero mockup -->
            <img src="spa_landing_hero_1773750855975.png" alt="Ebook Mockup">
        </div>
    </div>

</body>
</html>
